services:
  - type: web
    name: delivery-tracker
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm run install-all && npm run build
    startCommand: npm --prefix backend start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
    healthCheckPath: /api/health
    disk:
      name: data
      mountPath: /app/backend
      sizeGB: 1
